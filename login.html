<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Swapify</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

    <div class="auth-container">

        <h2>Login to Swapify</h2>

        <input type="text" placeholder="Username or Email">
        <input type="password" placeholder="Password">

        <button onclick="validateLogin()" class="primary-btn">
Login
</button>



        <p class="link" onclick="showForgot()">Forgot Password?</p>

        <div id="forgotBox" class="hidden">
            <input type="email" placeholder="Enter your email">
            <button class="primary-btn">Send Reset Link</button>
        </div>

        <p>New user? <a href="register.html">Register here</a></p>

    </div>

  <script type="module" src="script.js"></script>
</body>

</html>
